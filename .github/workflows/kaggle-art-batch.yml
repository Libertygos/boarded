name: Kaggle art batch

on:
  workflow_dispatch:
    inputs:
      download_only:
        description: "Skip dataset/kernel push; poll the already-running kernel and fetch its output"
        type: boolean
        default: false
      batch:
        description: "Manifest batch to generate: a = crew + boardings, b = raids + curses + maps, c = talismans + backs + role"
        type: choice
        options: [all, a, b, c]
        default: all

concurrency:
  group: kaggle-art-batch
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-batch:
    name: Anchor batch via Kaggle CLI
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - name: Install Kaggle CLI
        # Unpinned on purpose. A 1.7.x pin (tried in 34b4b8f while chasing what
        # turned out to be an expired API key) silently dropped the
        # machine_shape field on kernel push — Kaggle then allocated its
        # default P100 (sm_60), which current torch builds cannot run
        # (run 29487114506). Latest CLI + valid kaggle.json is the known-good
        # combination from the 2026-07-13 green runs.
        run: pip install --quiet kaggle

      - name: Configure credentials
        env:
          KAGGLE_JSON: ${{ secrets.KAGGLE_JSON }}
        run: |
          if [ -z "$KAGGLE_JSON" ]; then
            echo "KAGGLE_JSON repository secret is not set — aborting before any Kaggle call" >&2
            exit 1
          fi
          umask 077
          mkdir -p ~/.kaggle
          printf '%s' "$KAGGLE_JSON" > ~/.kaggle/kaggle.json

      # Fail in seconds with a clear message when the stored key is dead,
      # instead of a confusing CLI error mid-pipeline (see run 29482700899).
      - name: Verify Kaggle auth
        run: python3 "$GITHUB_WORKSPACE/tools/art/kaggle_auth_probe.py"

      - name: Stage manifest into dataset dir (batch filter)
        if: ${{ !inputs.download_only }}
        env:
          BATCH: ${{ inputs.batch || 'all' }}
        run: |
          python3 - <<'EOF'
          import csv, os
          batch = (os.environ.get("BATCH") or "all").lower()
          rows = list(csv.DictReader(open("docs/art/art_manifest.csv")))
          kept = 0
          for r in rows:
              if (r.get("status") == "pending" and batch != "all"
                      and (r.get("batch") or "").lower() != batch):
                  r["status"] = "deferred"
              kept += r.get("status") == "pending"
          with open("tools/art/dataset/art_manifest.csv", "w", newline="", encoding="utf-8") as fh:
              w = csv.DictWriter(fh, fieldnames=list(rows[0].keys()))
              w.writeheader()
              w.writerows(rows)
          print(f"batch={batch}: {kept} rows staged as pending")
          EOF

      - name: Create or version dataset
        if: ${{ !inputs.download_only }}
        run: |
          set +e
          out=$(kaggle datasets create -p tools/art/dataset 2>&1)
          rc=$?
          echo "$out"
          if [ $rc -ne 0 ] || echo "$out" | grep -qiE "already exists|already in use|409"; then
            if echo "$out" | grep -qiE "already exists|already in use|409"; then
              echo "Dataset exists — pushing new version"
              kaggle datasets version -p tools/art/dataset -m "manifest v1" || exit 1
            else
              echo "Dataset create failed with an unexpected error (see output above)"
              exit 1
            fi
          fi

      - name: Wait for dataset version to be live
        if: ${{ !inputs.download_only }}
        # `kaggle datasets status` reports "ready" while the PREVIOUS version
        # is still the one being served — kernel v24 ran with the old manifest
        # that way (run 29506321710) and regenerated a stale batch. Only trust
        # the version once the served manifest byte-matches the staged copy.
        run: |
          mkdir -p /tmp/ds_check
          for i in $(seq 1 20); do
            rm -f /tmp/ds_check/art_manifest.csv*
            kaggle datasets download julesloison/abordage-art-manifest -f art_manifest.csv -p /tmp/ds_check --force >/dev/null 2>&1 || true
            [ -f /tmp/ds_check/art_manifest.csv.zip ] && unzip -oq /tmp/ds_check/art_manifest.csv.zip -d /tmp/ds_check
            if cmp -s tools/art/dataset/art_manifest.csv /tmp/ds_check/art_manifest.csv 2>/dev/null; then
              echo "$(date -u +%H:%M:%S) new dataset version is live (served manifest matches staged copy)"
              exit 0
            fi
            echo "$(date -u +%H:%M:%S) new dataset version not live yet"
            sleep 15
          done
          echo "New dataset version never went live — kernel would run against the stale manifest"
          exit 1

      - name: Push kernel
        if: ${{ !inputs.download_only }}
        run: |
          out=$(kaggle kernels push -p tools/art/kernel 2>&1)
          echo "$out"
          if echo "$out" | grep -qi "not valid dataset sources"; then
            echo "Dataset source failed to attach — aborting instead of running a doomed kernel"
            exit 1
          fi
          # Right after a push the status endpoint still reports the PREVIOUS
          # version as complete; polling immediately raced and downloaded
          # stale output (run of 2026-07-16 ~14:0x). Give the new version
          # time to enter the queue before the poll loop starts.
          sleep 120

      # 3h: 33 manifest rows at fp32 layerwise compute run ~3-4 min/image on
      # the T4s — a 90-min ceiling abandoned run 29489204041 mid-generation.
      - name: Poll kernel status (3 h hard timeout)
        run: |
          deadline=$(( $(date +%s) + 10800 ))
          while true; do
            status=$(kaggle kernels status julesloison/abordage-art-batch 2>&1)
            echo "$(date -u +%H:%M:%S) $status"
            if echo "$status" | grep -qi "complete"; then
              echo "KERNEL_RESULT=complete" >> "$GITHUB_ENV"; break
            fi
            if echo "$status" | grep -qi "error"; then
              echo "KERNEL_RESULT=error" >> "$GITHUB_ENV"; break
            fi
            if echo "$status" | grep -qi "cancel"; then
              echo "KERNEL_RESULT=cancelled" >> "$GITHUB_ENV"; break
            fi
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "KERNEL_RESULT=timeout" >> "$GITHUB_ENV"; break
            fi
            sleep 60
          done

      - name: Download kernel output
        run: |
          mkdir -p /tmp/art_out
          kaggle kernels output julesloison/abordage-art-batch -p /tmp/art_out || true
          ls -la /tmp/art_out

      - name: Report error log
        if: env.KERNEL_RESULT != 'complete'
        run: |
          echo "Kernel finished with result: $KERNEL_RESULT"
          echo "===== log tail (last 50 lines) ====="
          tail -n 50 /tmp/art_out/*.log 2>/dev/null || echo "(no .log file in output)"
          exit 1

      - name: Unpack and report results
        if: env.KERNEL_RESULT == 'complete'
        run: |
          unzip -o /tmp/art_out/art_batch.zip -d /tmp/art_out/anchors
          echo "===== anchors ====="
          ls -la /tmp/art_out/anchors
          echo "===== generation_log.csv ====="
          cat /tmp/art_out/anchors/generation_log.csv 2>/dev/null || find /tmp/art_out/anchors -name generation_log.csv -exec cat {} \;

      # The review sessions run in a sandbox whose egress proxy blocks the
      # Azure blob host serving Actions artifacts (and kaggle.com itself) —
      # git is the only channel they can pull binaries through. Publish the
      # unpacked batch to a scratch orphan branch; the branch is disposable
      # and force-pushed per run.
      - name: Publish output to scratch branch
        if: env.KERNEL_RESULT == 'complete'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd /tmp/art_out/anchors
          git init -b art-batch-out
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "raw batch output (run ${GITHUB_RUN_ID})"
          git push --force "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" art-batch-out
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: art-batch-output
          path: /tmp/art_out
          if-no-files-found: warn
          retention-days: 14
