name: Kaggle art batch

on:
  workflow_dispatch:

concurrency:
  group: kaggle-art-batch
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-batch:
    name: Anchor batch via Kaggle CLI
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4

      - name: Install Kaggle CLI
        # Pinned: the unpinned CLI released after 2026-07-13 switched to an
        # OAuth / KAGGLE_API_TOKEN auth flow and stopped honoring
        # ~/.kaggle/kaggle.json, which broke this job (run 29482533460).
        run: pip install --quiet "kaggle==1.7.*"

      - name: Configure credentials
        env:
          KAGGLE_JSON: ${{ secrets.KAGGLE_JSON }}
        run: |
          if [ -z "$KAGGLE_JSON" ]; then
            echo "KAGGLE_JSON repository secret is not set — aborting before any Kaggle call" >&2
            exit 1
          fi
          umask 077
          mkdir -p ~/.kaggle
          printf '%s' "$KAGGLE_JSON" > ~/.kaggle/kaggle.json

      # Fail in seconds with a clear message when the stored key is dead,
      # instead of a confusing CLI error mid-pipeline (see run 29482700899).
      - name: Verify Kaggle auth
        run: python3 "$GITHUB_WORKSPACE/tools/art/kaggle_auth_probe.py"

      - name: Stage manifest into dataset dir
        run: cp docs/art/art_manifest.csv tools/art/dataset/art_manifest.csv

      - name: Create or version dataset
        run: |
          set +e
          out=$(kaggle datasets create -p tools/art/dataset 2>&1)
          rc=$?
          echo "$out"
          if [ $rc -ne 0 ] || echo "$out" | grep -qiE "already exists|already in use|409"; then
            if echo "$out" | grep -qiE "already exists|already in use|409"; then
              echo "Dataset exists — pushing new version"
              kaggle datasets version -p tools/art/dataset -m "manifest v1" || exit 1
            else
              echo "Dataset create failed with an unexpected error (see output above)"
              exit 1
            fi
          fi

      - name: Wait for dataset to be ready
        run: |
          for i in $(seq 1 20); do
            s=$(kaggle datasets status julesloison/abordage-art-manifest 2>&1) || true
            echo "$(date -u +%H:%M:%S) $s"
            if echo "$s" | grep -qi "ready"; then exit 0; fi
            sleep 15
          done
          echo "Dataset never reached ready state — kernel push would run without the manifest attached"
          exit 1

      - name: Push kernel
        run: |
          out=$(kaggle kernels push -p tools/art/kernel 2>&1)
          echo "$out"
          if echo "$out" | grep -qi "not valid dataset sources"; then
            echo "Dataset source failed to attach — aborting instead of running a doomed kernel"
            exit 1
          fi

      - name: Poll kernel status (90 min hard timeout)
        run: |
          deadline=$(( $(date +%s) + 5400 ))
          while true; do
            status=$(kaggle kernels status julesloison/abordage-art-batch 2>&1)
            echo "$(date -u +%H:%M:%S) $status"
            if echo "$status" | grep -qi "complete"; then
              echo "KERNEL_RESULT=complete" >> "$GITHUB_ENV"; break
            fi
            if echo "$status" | grep -qi "error"; then
              echo "KERNEL_RESULT=error" >> "$GITHUB_ENV"; break
            fi
            if echo "$status" | grep -qi "cancel"; then
              echo "KERNEL_RESULT=cancelled" >> "$GITHUB_ENV"; break
            fi
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "KERNEL_RESULT=timeout" >> "$GITHUB_ENV"; break
            fi
            sleep 60
          done

      - name: Download kernel output
        run: |
          mkdir -p /tmp/art_out
          kaggle kernels output julesloison/abordage-art-batch -p /tmp/art_out || true
          ls -la /tmp/art_out

      - name: Report error log
        if: env.KERNEL_RESULT != 'complete'
        run: |
          echo "Kernel finished with result: $KERNEL_RESULT"
          echo "===== log tail (last 50 lines) ====="
          tail -n 50 /tmp/art_out/*.log 2>/dev/null || echo "(no .log file in output)"
          exit 1

      - name: Unpack and report results
        if: env.KERNEL_RESULT == 'complete'
        run: |
          unzip -o /tmp/art_out/art_batch.zip -d /tmp/art_out/anchors
          echo "===== anchors ====="
          ls -la /tmp/art_out/anchors
          echo "===== generation_log.csv ====="
          cat /tmp/art_out/anchors/generation_log.csv 2>/dev/null || find /tmp/art_out/anchors -name generation_log.csv -exec cat {} \;

      # The review sessions run in a sandbox whose egress proxy blocks the
      # Azure blob host serving Actions artifacts (and kaggle.com itself) —
      # git is the only channel they can pull binaries through. Publish the
      # unpacked batch to a scratch orphan branch; the branch is disposable
      # and force-pushed per run.
      - name: Publish output to scratch branch
        if: env.KERNEL_RESULT == 'complete'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd /tmp/art_out/anchors
          git init -b art-batch-out
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "raw batch output (run ${GITHUB_RUN_ID})"
          git push --force "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" art-batch-out
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: art-batch-output
          path: /tmp/art_out
          if-no-files-found: warn
          retention-days: 14
