name: Kaggle kernel log

on:
  workflow_dispatch:

jobs:
  dump-log:
    name: Dump full kernel log
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Configure credentials
        env:
          KAGGLE_JSON: ${{ secrets.KAGGLE_JSON }}
        run: |
          if [ -z "$KAGGLE_JSON" ]; then
            echo "KAGGLE_JSON repository secret is not set — aborting before any Kaggle call" >&2
            exit 1
          fi
          mkdir -p ~/.kaggle
          printf '%s' "$KAGGLE_JSON" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Probe API auth
        run: |
          python3 - <<'EOF'
          import base64, json, os, urllib.request, urllib.error
          creds = json.load(open(os.path.expanduser("~/.kaggle/kaggle.json")))
          print("credential fields:", sorted(creds.keys()),
                "username:", creds.get("username"),
                "key length:", len(creds.get("key", "")))
          auth = base64.b64encode(f"{creds['username']}:{creds['key']}".encode()).decode()
          url = ("https://www.kaggle.com/api/v1/kernels/status"
                 "?userName=julesloison&kernelSlug=abordage-art-batch")
          req = urllib.request.Request(url, headers={"Authorization": "Basic " + auth})
          try:
              resp = urllib.request.urlopen(req)
              print("AUTH PROBE:", resp.status, resp.read(500))
          except urllib.error.HTTPError as e:
              print("AUTH PROBE FAILED:", e.code, e.reason, e.read(500))
          EOF

      - name: Fetch and print kernel log
        run: |
          python3 - <<'EOF'
          import base64, json, os, urllib.request
          creds = json.load(open(os.path.expanduser("~/.kaggle/kaggle.json")))
          auth = base64.b64encode(f"{creds['username']}:{creds['key']}".encode()).decode()
          url = ("https://www.kaggle.com/api/v1/kernels/output"
                 "?userName=julesloison&kernelSlug=abordage-art-batch")
          req = urllib.request.Request(url, headers={"Authorization": "Basic " + auth})
          data = json.load(urllib.request.urlopen(req))
          log = data.get("log") or ""
          try:
              entries = json.loads(log)
              for e in entries:
                  print(f"[{e.get('stream_name','?')}] {e.get('data','')}", end="")
          except (ValueError, TypeError):
              print(log)
          EOF

      - name: Inspect output images
        run: |
          pip install --quiet kaggle pillow
          mkdir -p /tmp/inspect
          kaggle kernels output julesloison/abordage-art-batch -p /tmp/inspect || true
          python3 - <<'EOF'
          import glob
          from PIL import Image
          for p in sorted(glob.glob("/tmp/inspect/art/*.png")):
              img = Image.open(p)
              colors = img.getcolors(maxcolors=1 << 20)
              print(f"{p.split('/')[-1]}: size={img.size} mode={img.mode} "
                    f"extrema={img.getextrema()} unique_colors={len(colors) if colors else '>1M'}")
          EOF
